<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LivePulse — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">

  <div class="login-container">
    <h1>LivePulse</h1>
    <p class="tagline">Real-time updates from the world</p>

    <div class="login-card">
      <h2>Login</h2>

      <input id="username" type="text" placeholder="Username" autocomplete="username" />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />

      <p id="loginError" class="error-text"></p>

      <button id="loginBtn" onclick="login()">Login</button>

      <p class="small-text">
        Don't have an account? <a href="register.html">Create Account</a>
      </p>
    </div>
  </div>

  <script>
    if (localStorage.getItem("token")) {
      window.location.href = "index.html";
    }

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errorEl  = document.getElementById("loginError");
      const btn      = document.getElementById("loginBtn");

      errorEl.textContent = "";

      if (!username || !password) {
        errorEl.textContent = "Please enter both username and password.";
        return;
      }

      btn.textContent = "Logging in...";
      btn.disabled    = true;

      try {
        const response = await fetch("https://livepulse-0450.onrender.com/login", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ username, password }),
        });

        const data = await response.json();

        if (response.ok && data.token) {
          localStorage.setItem("token",    data.token);
          localStorage.setItem("interest", data.interest || "all");
          localStorage.setItem("username", username);
          window.location.href = "index.html";
        } else {
          errorEl.textContent = data.message || "Login failed. Please try again.";
        }
      } catch (err) {
        errorEl.textContent = "Cannot connect to server. Make sure the backend is running.";
      } finally {
        btn.textContent = "Login";
        btn.disabled    = false;
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>

</body>
</html>
